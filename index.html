<!DOCTYPE html>
<html>
  <head>
    <title>Minimal Recipes</title>
  </head>
  <body>
    <input type="search" id="recipe-search" placeholder="Search for a recipe">
    <div id="search-results"></div>

    <script src="./script.js"></script>

    <script>
      const searchInput = document.getElementById("recipe-search");
      const searchResults = document.getElementById("search-results");

      searchInput.addEventListener("input", (event) => {
        console.log("Input event fired");
        const query = event.target.value;
        console.log("Search query:", query);
        const matchingRecipes = searchRecipes(query);
        console.log("Matching recipes:", matchingRecipes);
        const resultHtml = matchingRecipes
          .map((recipe) => {
            return `<a href="${recipe.fileName}">${recipe.recipeName}</a>`;
          })
          .join(" ");
        searchResults.innerHTML = resultHtml;
      });
    </script>
  </body>
</html>
